<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/all.min.css">
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    <title>To-Do-List</title>
</head>
<body>
    <section>
        <div class="container">
            <div class="card text-center justify-content-center align-items-center">
                <h2>My To-Do-List</h2>
                <div class="row justify-content-center align-items-center">
                    <div class="col-12 col-md-8">
                        <input type="text" class="form-control" placeholder="Enter a new task" aria-label="task" aria-describedby="addon-wrapping">
                    </div>
                    <div class="col-12 col-md-4">
                        <button class="btn w-100">Add Task</button>
                    </div>
                </div>
                <div class="row justify-content-center mt-2">
                    <div class="taskcard">
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="JS/bootstrap.bundle.min.js"></script>
    <script src="JS/main.js"></script>
</body>
</html>
